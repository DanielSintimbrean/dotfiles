# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale
# You must relaunch Hyprland after changing any envs (use Super+Esc, then Relaunch)

# Straight 1x setup for low-resolution displays like 1080p or 1440p
env = GDK_SCALE,1

# Monitor definitions (initial state before handler kicks in)
monitor = eDP-1, 2560x1600@60, 0x0, 1.67
monitor = HDMI-A-1, 1920x1080@60, auto, 1.33
monitor = DP-2, 1920x1080@143.60, -1920x0, 1

# Auto-switch: when HDMI-A-1 is connected, use ONLY HDMI (disable eDP-1 & DP-2).
# When HDMI is disconnected, re-enable eDP-1.
# Uses Hyprland IPC events (monitoraddedv2/monitorremoved) via socat.
exec-once = ~/.config/hypr/scripts/monitor-handler.sh
