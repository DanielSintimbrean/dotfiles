# First param ÔöÇÔöî
[username]
format = " [Ôò¡ÔöÇ$user]($style)@"
show_always = true
style_root = "bold red"
style_user = "bold red"

# Second param
[hostname]
disabled = false
format = "[$hostname]($style) in "
ssh_only = false
style = "bold dimmed red"
trim_at = "-"
ssh_symbol = "¯¼ü "

# Third param
[directory]
style = "purple"
truncate_to_repo = true
truncation_length = 0
truncation_symbol = "repo: "
read_only = " ¾░î¥"

# Fourth param
[sudo]
disabled = false

# Before all the version info (python, nodejs, php, etc.)
[git_status]
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
deleted = "x"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
style = "white"

# Last param in the first line/row
[cmd_duration]
disabled = false
format = " [$duration]($style) "
min_time = 4_000 


## SECOND LINE/ROW: Prompt
# Somethere at the beginning
[battery]
disabled = false
charging_symbol = "¾░éä"
discharging_symbol = "¾░éé"
full_symbol = '¾▒şó'

[[battery.display]]  # "bold red" style when capacity is between 0% and 10%
style = "bold red"
threshold = 15

[[battery.display]]  # "bold yellow" style when capacity is between 10% and 30%
style = "bold yellow"
threshold = 50

[[battery.display]]  # "bold green" style when capacity is between 10% and 30%
style = "bold green"
threshold = 80

[[battery.display]]  # "bold green" style when capacity is between 10% and 30%
style = "bold blue"
threshold = 100

# Prompt: optional param 1
[time]
disabled = true
format = " ´Çù  $time($style)\n"
style = "bright-white"
time_format = "%T"

# Prompt: param 2
[character]
error_symbol = " [Ôò░ÔöÇ├ù](bold red)"
success_symbol = " [Ôò░ÔöÇ´ıÖ](bold red)"
vimcmd_symbol = " [Ôò░ÔöÇN](bold green)"
vimcmd_visual_symbol = " [Ôò░ÔöÇV](bold yellow)"
vimcmd_replace_symbol = " [Ôò░ÔöÇR](bold purple)"
vimcmd_replace_one_symbol = " [Ôò░ÔöÇR](bold purple)"

